<?xml version="1.0" encoding="UTF-8"?>
<!-- Section A — Back-face keyhole detail. Scale 2:1 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" font-family="sans-serif">
  <style>
    .frame { fill: none; stroke: #222; stroke-width: 2; }
    .stock { fill: #f5e9c8; stroke: #2b2b2b; stroke-width: 2; }
    .pocket { fill: #c8b87a; stroke: #2b2b2b; stroke-width: 1; }
    .dim   { stroke: #6b3; stroke-width: 1; fill: none; }
    .dimtext { font-size: 14px; fill: #2a2a2a; }
    .title { font-size: 18px; font-weight: 700; fill: #111; }
    .meta  { font-size: 12px; fill: #444; }
    .center { stroke: #888; stroke-width: 1; stroke-dasharray: 6 3 1 3; fill: none; }
  </style>

  <rect class="frame" x="20" y="20" width="860" height="420"/>
  <rect class="frame" x="20" y="440" width="860" height="40"/>
  <text class="title" x="35" y="468">Section A — Keyhole Slot (Back Face)</text>
  <text class="meta"  x="500" y="468">Scale 2:1  |  Units: in  |  Sheet 3 of 3  |  2026-05-07</text>

  <!-- Sign body, scaled 36 px/in -->
  <rect class="stock" x="120" y="180" width="648" height="216" rx="9" ry="9"/>
  <line class="center" x1="120" y1="288" x2="768" y2="288"/>

  <!-- Two keyhole slots, 12 in apart, on horizontal center -->
  <!-- Slot positions: 3 in from each end. Center x = 120 + 3*36 = 228. Center x2 = 120 + 15*36 = 660 -->
  <!-- Slot length 1.25 in = 45 px. Wide 0.40 = 14.4 px. Narrow 0.18 = 6.5 px -->
  <g class="pocket">
    <!-- Slot 1: wide circle on top, slot down -->
    <circle cx="228" cy="280" r="7.2"/>
    <rect x="225" y="280" width="6" height="35"/>
    <circle cx="228" cy="315" r="3.25"/>

    <circle cx="660" cy="280" r="7.2"/>
    <rect x="657" y="280" width="6" height="35"/>
    <circle cx="660" cy="315" r="3.25"/>
  </g>

  <!-- Slot center to center -->
  <line class="dim" x1="228" y1="160" x2="660" y2="160"/>
  <line class="dim" x1="228" y1="155" x2="228" y2="165"/>
  <line class="dim" x1="660" y1="155" x2="660" y2="165"/>
  <text class="dimtext" x="444" y="152" text-anchor="middle">x_m = 12.000 in</text>

  <!-- Slot 1 detail callout -->
  <g transform="translate(80, 80)">
    <rect class="frame" x="0" y="0" width="360" height="80"/>
    <text class="title" x="10" y="20" font-size="13">Detail (slot 1, magnified)</text>
    <!-- 4x detail of slot1 -->
    <g transform="translate(150, 40)" class="pocket">
      <circle cx="0" cy="-15" r="14.4"/>
      <rect x="-6" y="-15" width="12" height="35"/>
      <circle cx="0" cy="20" r="6.5"/>
    </g>
    <text class="dimtext" x="200" y="35">D_kw = 0.400 (head clearance)</text>
    <text class="dimtext" x="200" y="55">D_kn = 0.180 (#8 shank)</text>
    <text class="dimtext" x="200" y="75">L_k  = 1.250 ; depth d_k = 0.150</text>
  </g>

  <!-- Edge offset callout -->
  <text class="dimtext" x="120" y="420">3.000 from end (typ.)</text>
  <text class="dimtext" x="660" y="420">3.000 from end (typ.)</text>

  <text class="meta" x="35" y="395">Notes: pocket cuts back-face only; through-thickness substrate remaining = 0.100 in. Orient narrow-end up when mounting.</text>
  <text class="meta" x="35" y="415" fill="#a44">Stub drawing — regenerate from VCarve or CAD before publishing.</text>
</svg>
