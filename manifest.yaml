    status: active
    first_class: true
    canonical_repo: https://github.com/tonykoop/StudioPipeline
    runtime: shared
    last_updated: 2026-06-15
    notes: >-
      StudioPipeline hardware-engineering / dogfood workflow (MakerBench, hwe).
      Promoted to the third first-class plugin alongside coding and maker. Its
