---
# Canonical version manifest for agentic skills.
# Update this file whenever a skill version is bumped, packaged, or deprecated.
#
# Skills now ship inside the `maker` and `coding` plugins under
# plugins/<plugin>/skills/. The `plugin:` field records which plugin owns each
# skill; `repo_path` points at the canonical source that ships.
# StudioPipeline is a separate plugin/repo (its own MCP server) — see
# external_plugins.

schema_version: 1
last_updated: 2026-06-13

install_roots:
  # Repo-relative source roots (resolve when skills-meta is run from this repo
  # root). Lets the auditor see skills now housed inside the plugins.
  repo:
    - plugins/coding/skills
    - plugins/maker/skills
    - skills
    - codex/skills
  windows:
    - /mnt/c/Users/Tony/.claude
    - /mnt/c/Users/Tony/.codex
    - /mnt/c/Users/Tony/Documents/GitHub/.claude
  wsl:
    - /home/tony/.claude
    - /home/tony/.codex
    - /home/tony/.gemini
    - /home/tony/wrfcoin/.claude
    - /home/tony/wrfcoin/.codex
    - /home/tony/wrfcoin/.gemini
  legacy:
    - /home/tony/wrfcoin/core4/.claude
    - /home/tony/wrfcoin/core4/.gemini

skills:
  # ----- coding plugin (plugins/coding/skills/) -----
  skills-meta:
    canonical_version: 1.0.0
    runtime: portable
    plugin: coding
    repo_path: plugins/coding/skills/skills-meta
    last_updated: 2026-05-08
    status: active
    notes: >-
      Portable drift-audit skill for Claude, Codex, Gemini, and desktop
      installs.

  tmux-sprint:
    canonical_version: 2.4.1
    runtime: claude
    plugin: coding
    repo_path: plugins/coding/skills/tmux-sprint
    last_updated: 2026-05-17
    status: active
    notes: >-
      Claude tmux sprint driver: TwinGrid blind A/B, Partner Peek, label-aware
      sprint batching / model-picker routing, and provider-failover pane
      recovery. Supersedes the retired Codex tmux-v2.

  merge-review:
    canonical_version: 0.1.0
    runtime: claude
    plugin: coding
    repo_path: plugins/coding/skills/merge-review
    last_updated: 2026-05-08
    status: active
    notes: Supersedes the retired Codex merge-manager.

  sprint-update:
    canonical_version: 1.1.1
    runtime: claude
    plugin: coding
    repo_path: plugins/coding/skills/sprint-update
    last_updated: 2026-05-11
    status: active
    notes: >-
      Personal GitHub sprint Queue columns (label/model/batch metadata), stale
      issue refresh, read-only refresh reporting, and PR-pressure clustering.

  sprint-supervisor:
    canonical_version: 1.1.0
    runtime: claude
    plugin: coding
    repo_path: plugins/coding/skills/sprint-supervisor
    last_updated: 2026-05-18
    status: active
    notes: >-
      Babysits a running multi-pane tmux sprint (auto-approve routine prompts,
      escalate destructive ones, morning summary). Part of the replacement for
      the retired Codex wrfcoin-sprint-dispatch.

  ci-triage:
    canonical_version: 0.1.0
    runtime: claude
    plugin: coding
    repo_path: plugins/coding/skills/ci-triage
    last_updated: 2026-05-20
    status: active
    notes: >-
      Read-only CI + Dependabot health snapshot across the WRFCoin repos. Does
      NOT remediate failing checks — see gh-fix-ci for that.

  scaffold-hygiene:
    canonical_version: 0.1.0
    runtime: claude
    plugin: coding
    repo_path: plugins/coding/skills/scaffold-hygiene
    last_updated: 2026-05-20
    status: active
    notes: Cross-repo scaffolding/drift sweep that files issues for real drift.

  run-swarm:
    canonical_version: 1.2.1
    runtime: shared
    plugin: coding
    repo_path: plugins/coding/skills/run-swarm
    last_updated: 2026-05-11
    status: active
    notes: >-
      Duplicate-aware issue filing, gated label creation, manager/Tony-decision
      queues, and machine-readable JSON/CSV queue artifacts.

  disk-cleanup:
    canonical_version: 1.0.0
    runtime: claude
    plugin: coding
    repo_path: plugins/coding/skills/disk-cleanup
    last_updated: 2026-05-08
    status: active

  gh-fix-ci:
    canonical_version: 1.0.0
    runtime: codex
    repo_path: codex/skills/gh-fix-ci
    last_updated: 2026-05-08
    status: active
    notes: >-
      Codex skill: debug and FIX a PR's failing GitHub Actions checks. NOT
      covered by ci-triage (which is read-only). Not yet homed in the coding
      plugin — candidate to migrate into plugins/coding once a Claude-side
      equivalent exists. (Retained: tmux-v2, merge-manager, and
      wrfcoin-sprint-dispatch were retired in their place; gh-fix-ci was not.)

  # ----- maker plugin (plugins/maker/skills/) -----
