# Skills that lived as standalone Codex copies and have been retired because a
# more capable Claude/plugin skill now covers them. Removed from codex/skills/.
retired_skills:
  tmux-v2:
    retired: 2026-06-13
    superseded_by: tmux-sprint
  merge-manager:
    retired: 2026-06-13
    superseded_by: merge-review
  wrfcoin-sprint-dispatch:
    retired: 2026-06-13
    superseded_by: [sprint-supervisor, sprint-update, tmux-sprint]

# Separate plugins distributed from their own repos but listed in the
# tony-koop marketplace.
external_plugins:
  studiopipeline:
    repo: https://github.com/tonykoop/StudioPipeline
    version: 0.1.0
    status: active
    notes: >-
      Agentic episodic-video pipeline for makers; ships its own MCP server
      (.mcp.json), so it stays a separate plugin rather than being vendored
      into the maker plugin. Listed in the tony-koop marketplace alongside
      maker and coding.

planned_skills:
  energy-management:
    status: issue-handoff
  run-benchmark:
    status: pr-pending
    notes: >-
      MakerBench contributor skill (run -> scrutinize -> issue -> PR -> submit)
      expected from a makerbench-hwe PR. Add a full entry once the SKILL.md
      lands and the PR merges.
