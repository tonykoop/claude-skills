    instagram: https://www.instagram.com/gabrielschama/
    start:                     # seconds — fill ONLY when confirmed
    capture:                   # e.g. captures/schama-layered-relief.md (Obsidian clip)
    grounds: [inkscape]        # cross-links into the source registry (registry.yaml keys)
    instruments: []
    tags: [laser, layered-relief, assembly, glue-up]
    status: unconfirmed
    what_they_show: >-
