# Techniques registry — demonstrations of HOW, by real makers.
#
# Unit of record: a person showing a technique. NOT a tool homepage (that's
# the source bibliography). The live URL is a disposable POINTER; the durable
# record is `what_they_show` plus an optional local Obsidian capture.
#
# STATUS field is load-bearing:
#   confirmed   — a human watched/read it and the timestamp + what_they_show
#                 are verified accurate.
#   unconfirmed — creator/platform/url are real, but the moment, timestamp, and
#                 technique description are NOT yet verified. These are seeds.
#                 NEVER render an unconfirmed entry as a verified citation.
#
# `start` (seconds) is meaningful ONLY when status is confirmed. Leaving it
# blank on an unconfirmed entry is correct — do not guess it.
version: 1
techniques:

