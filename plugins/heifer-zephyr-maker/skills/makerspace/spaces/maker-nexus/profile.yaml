# Maker Nexus — Sunnyvale, CA
# Profile is a starter snapshot. Many fields are TBD — verify against
# the actual Maker Nexus wiki at https://www.makernexus.org and the
# wiki at wiki.makernexus.org before relying on a specific value.
#
# Tony, please correct any field that's wrong from your member experience.

slug: maker-nexus
name: Maker Nexus
location:
  city: Sunnyvale
  state: CA
  country: US
url: https://www.makernexus.org

# This is a seed profile. The categories below reflect Maker Nexus's
# major shop areas; specific machines should be verified and added as
# accurate IDs / specs are known.
tools:
  - id: woodshop-area
    name: Woodshop area
    category: other
    location: woodshop
    notes: Tablesaw, miter saw, jointer, planer, drum sander, drill
      press, bandsaws, router table, hand-tool benches. See
      tools.md for the per-machine list once verified.
    cert_required: woodshop-cert

  - id: cnc-area
    name: CNC routing area
    category: cnc-router
    location: woodshop
    specs:
      bed_size_in: [TBD, TBD]
      max_z_in: TBD
    allowed_materials: [hardwood, plywood, mdf, hdpe, foam]
    banned_materials: [aluminum, ferrous, steel, brass]
    cert_required: cnc-cert
    reservation: required
    reservation_url: ""

  - id: laser-area
    name: Laser cutting area
    category: laser-cutter
    location: laser-room
    specs:
      bed_size_in: [TBD, TBD]
      power_w: TBD
      type: CO2
    allowed_materials: [acrylic, plywood-thin, mdf, leather, paper, cardboard]
    banned_materials: [pvc, vinyl, abs, polycarbonate, ptfe]
    cert_required: laser-cert
    reservation: required

  - id: 3d-print-fdm-area
    name: 3D printing — FDM
    category: 3d-printer-fdm
    location: 3d-print-room
    cert_required: 3dp-fdm-cert
    reservation: queue

  - id: 3d-print-resin-area
    name: 3D printing — resin / SLA
    category: 3d-printer-sla
    location: 3d-print-room
    cert_required: 3dp-resin-cert

  - id: metalshop-area
    name: Metalshop area
    category: other
    location: metalshop
    notes: Mills, lathes, welders. See tools.md for specific machines.
    cert_required: metalshop-cert

  - id: textile-area
    name: Textile / sewing area
    category: sewing-machine-domestic
    location: textile-room
    cert_required: textile-cert

  - id: electronics-bench
    name: Electronics bench
    category: electronics-bench
    location: electronics-area
    cert_required: ""

materials:
  - id: hardwood-generic
    name: Hardwood (member-supplied)
    available_in_shop: false
    notes: Most members source from MacBeath in Berkeley.

  - id: baltic-birch-quarter
    name: Baltic birch plywood, ¼"
    sheet_size_in: [60, 60]
    thickness_in: 0.25
    available_in_shop: false

  - id: mdf-half
    name: MDF, ½"
    sheet_size_in: [48, 96]
    thickness_in: 0.5
    available_in_shop: false

certifications:
  - id: shop-safety-cert
    name: Shop Safety Orientation
    grants_access_to: [woodshop-area, metalshop-area, electronics-bench]
    granted_by_class: class-shop-orientation
    notes: Required before any other cert.

  - id: woodshop-cert
    name: Woodshop Certification
    grants_access_to: [woodshop-area]
    granted_by_class: class-woodshop-intro

  - id: cnc-cert
    name: CNC Router Certification
    grants_access_to: [cnc-area]
    granted_by_class: class-cnc-intro

  - id: laser-cert
    name: Laser Cutter Certification
    grants_access_to: [laser-area]
    granted_by_class: class-laser-intro

  - id: 3dp-fdm-cert
    name: 3D Printing FDM Certification
    grants_access_to: [3d-print-fdm-area]
    granted_by_class: class-3dp-fdm

  - id: 3dp-resin-cert
    name: 3D Printing Resin Certification
    grants_access_to: [3d-print-resin-area]
    granted_by_class: class-3dp-resin

  - id: metalshop-cert
    name: Metalshop Certification
    grants_access_to: [metalshop-area]
    granted_by_class: class-metalshop-intro

  - id: textile-cert
    name: Textile Certification
    grants_access_to: [textile-area]
    granted_by_class: class-textile-intro

classes:
  - id: class-shop-orientation
    name: Shop Safety Orientation
    grants_certs: [shop-safety-cert]
    duration_hours: 1
    schedule_url: https://www.makernexus.org/classes
  - id: class-woodshop-intro
    name: Intro to Woodshop
    grants_certs: [woodshop-cert]
    duration_hours: 4
    schedule_url: https://www.makernexus.org/classes
  - id: class-cnc-intro
    name: Intro to CNC Routing
    grants_certs: [cnc-cert]
    duration_hours: 4
    schedule_url: https://www.makernexus.org/classes
  - id: class-laser-intro
    name: Intro to Laser Cutting
    grants_certs: [laser-cert]
    duration_hours: 2
    schedule_url: https://www.makernexus.org/classes
  - id: class-3dp-fdm
    name: 3D Printing — FDM
    grants_certs: [3dp-fdm-cert]
    duration_hours: 2
    schedule_url: https://www.makernexus.org/classes
  - id: class-3dp-resin
    name: 3D Printing — Resin
    grants_certs: [3dp-resin-cert]
    duration_hours: 2
    schedule_url: https://www.makernexus.org/classes
  - id: class-metalshop-intro
    name: Intro to Metalshop
    grants_certs: [metalshop-cert]
    duration_hours: 4
    schedule_url: https://www.makernexus.org/classes
  - id: class-textile-intro
    name: Intro to Textile
    grants_certs: [textile-cert]
    duration_hours: 2
    schedule_url: https://www.makernexus.org/classes

hours:
  notes: 24/7 access for members in good standing; staff hours vary by day.

membership_tiers:
  - name: Member
    monthly_usd: TBD
    notes: Verify on the Maker Nexus website.

tools_md: tools.md
materials_policy_md: materials-policy.md
certifications_md: certifications.md
classes_md: classes.md
safety_rules_md: safety-rules.md

last_updated: 2026-05-07
last_updated_by: tony-koop
data_sources:
  - https://www.makernexus.org
  - https://wiki.makernexus.org
notes_md: ""
notebooklm_url: ""
visibility: public
