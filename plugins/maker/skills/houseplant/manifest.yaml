v2_features:
  - issue: 172
    feature: chrono-horticultural calendar engine
    delivered: [references/chrono-engine.md, scripts/wire_window.py, scripts/care_cadence.py]  # care_cadence.py (watering/fertilizing cadence) added v0.6.0
  - issue: 173
    feature: bud and bloom chrono-tracker
    delivered: [references/bud-bloom-tracker.md, scripts/bloom_forecast.py]  # marker reuses cut_marker.py; forecast helper added v0.5.0
  - issue: 174
    feature: aerial-root and nebari guidance tracker
    delivered: [references/aerial-roots-nebari.md, scripts/aerial_root_trace.py]
  - issue: 175
    feature: computer-vision plant health diagnostics
    delivered: [references/health-diagnostics.md, scripts/health_triage.py]  # script added v0.4.0
  - issue: 176
    feature: virtual grafting sandbox in Blender
    delivered: [references/grafting-sandbox.md, scripts/grafting_sim.py]
  - issue: 177
    feature: propagation tracker
    delivered: [references/propagation.md, scripts/propagation_tracker.py]  # lineage+lifecycle+rooting helper added v0.6.0

# Sibling skills the houseplant skill may hand off to.
hand_offs:
  reverse-engineer: "When the user needs to reconstruct an unknown object or mechanism from sparse photos before turning it into a plant-related artifact (e.g. inferred pot/planter geometry)."
  makerspace: "When the user wants fabrication plans for plant stands, jigs, fixtures, shelves, irrigation hardware, or any wood/metal/plastic build that supports the collection."
