# Space profile template. Copy this whole folder to spaces/<your-slug>/
# and fill in every line marked REQUIRED. Delete fields you don't use.
#
# Schema reference: references/space-profile-schema.md

# ───── REQUIRED ──────────────────────────────────────────────
slug: example-space         # REQUIRED — kebab-case, matches folder name
name: Example Makerspace    # REQUIRED — human-readable
location:
  city: ""                  # REQUIRED
  state: ""
  country: ""               # REQUIRED — ISO code (US, CA, GB, etc.)
url: ""                     # REQUIRED if the shop has a public site

# ───── EMPTY-OK COLLECTIONS ──────────────────────────────────
# Start with empty lists; fill in over time.
tools: []
materials: []
certifications: []
classes: []

# ───── OPTIONAL ──────────────────────────────────────────────
hours:                       # Free-form; replace with whatever's true
  monday: ""
  tuesday: ""
  wednesday: ""
  thursday: ""
  friday: ""
  saturday: ""
  sunday: ""

membership_tiers: []         # e.g. [{name: "Member", monthly_usd: 95}]

# Pointers to long-form prose attached to this profile
tools_md: tools.md
materials_policy_md: materials-policy.md
certifications_md: certifications.md
classes_md: classes.md
safety_rules_md: safety-rules.md
notes_md: ""                 # Optional catch-all

# Provenance — when was this last verified?
last_updated: 2026-01-01
last_updated_by: ""

# Data sources — how this profile was assembled
data_sources: []

# NotebookLM brain pointer (optional, see references/notebooklm-integration.md)
notebooklm_url: ""
notebooklm_synced_at: ""
notebooklm_source_files: []

# Visibility — public profiles can be shared in PRs and example artifacts
visibility: public           # one of: public | private

