interface:
  display_name: "Idea Incubator"
  short_description: "Capture, connect, review, and promote ideas via GitHub issues"
  default_prompt: "Use $idea-incubator to turn rough notes, Telegram dumps, and idea fragments into GitHub issue drafts, related-issue links, and promotion handoffs."
  triggers:
    - "new idea"
    - "incubate this"
    - "add this to the inbox"
    - "process my Telegram dump"
    - "review my ideas"
    - "does this connect to anything"
    - "promote idea #N"
    - "promote the cluster"
    - "batch promote"
    - "review the cluster"
policy:
  allow_implicit_invocation: true
