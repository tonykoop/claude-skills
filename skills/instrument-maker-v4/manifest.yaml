# Instrument Maker v4.5 — partial-skill manifest
# Manifest-first index for the additive repo subset. The canonical full
# skill lives outside this repo; this manifest lists only files shipped here.

name: instrument-maker-v4
version: 4.5.0
display_name: Instrument Maker v4.5 additive references
partial_skill: true
canonical_install: ~/.claude/skills/instrument-maker-v4
summary: >-
  Additive instrument-maker-v4 references, validators, templates, and examples
  for acoustic-law/free-reed checks and bowed-string packet support.

triggers:
  acoustic_law:
    - "khaen acoustic law"
    - "free reed boundary condition"
    - "validate acoustic_law"
    - "family-spec.csv acoustic_law"
  bowed_string:
    - "bowed lyre packet"
    - "tagelharpa build packet"
    - "yayli tambur packet"
    - "rebab packet"
    - "kemenche-adjacent packet"
    - "bow clearance"
    - "bridge crown"
    - "bowed string schedule"
    - "decorative no-carve zone"

references:
  - path: references/acoustic-models.md
    purpose: "Acoustic-law/free-reed boundary-condition decision tree and string model reference"
    load_when: "Sizing, tuning, or validating free-reed, wind, or string-family packet physics"
  - path: references/family-aware-design.md
    purpose: "family-spec.csv schema including acoustic_law, end_condition, and dimension_provenance"
    load_when: "Generating or validating family-aware packet rows"
  - path: references/bowed-string-packets.md
    purpose: "Bowed-string packet shape for tagelharpa, yayli tambur, rebab, kemenche-adjacent studies"
    load_when: "Prompt mentions bowed strings, bridge crown, bow clearance, active/sympathetic string staging, long-neck bowl instruments, or inlay/no-carve zones"

templates:
  - path: assets/templates/bowed-string-schedule.csv
    purpose: "String schedule helper with pitch, scale, gauge, tension, retuning, percent-breaking, and risk fields"
  - path: assets/templates/bowed-source-posture.csv
    purpose: "Claim ledger for sourced/prototype_assumption/TBD posture in traditional instrument seeds"
  - path: assets/templates/decorative-no-carve-zone.csv
    purpose: "No-carve-zone and inlay coupon planning helper"

examples:
  - path: examples/khaen/family-spec.csv
    purpose: "v4.4 acoustic_law family-spec example"
  - path: examples/bowed-string/tagelharpa-string-schedule.csv
    purpose: "Bass tagelharpa bowed-string schedule example with separate 720 mm and 620 mm variants"
  - path: examples/bowed-string/yayli-source-posture.csv
    purpose: "Yayli tambur source-posture ledger for branch decisions"

scripts:
  - path: scripts/validate_acoustic_law.py
    purpose: "Validate acoustic_law/end_condition/dimension_provenance fields in family-spec.csv"
    command: "python3 skills/instrument-maker-v4/scripts/validate_acoustic_law.py path/to/family-spec.csv"

tests:
  - path: tests/test_validate_acoustic_law.py
    command: "python3 -m unittest discover -s skills/instrument-maker-v4/tests -v"
    purpose: "Regression tests for acoustic-law validator and bowed-string asset manifest/template checks"
