# Cross-repo sister-repo registry for the tonykoop musical-instrument catalogue.
#
# Used by capstone deck + README generators to auto-link related repos.
# When generating a packet for instrument X, the generator queries this
# file with X's slug and emits links to all sisters in X's `sisters` list.
#
# Adding a new repo: append an entry under the appropriate group, then
# add the new slug to the `sisters` list of any related instrument.
# Groups are descriptive only — they don't constrain link generation.
#
# Schema:
#   <slug>:
#     name:        Human-readable instrument name
#     family:      Acoustic family (vessel-flute | duct-flute | open-pipe |
#                                  cantilever-idiophone | drum-cavity |
#                                  string-plucked | string-bowed | reed |
#                                  drum-skin | hybrid)
#     pipeline:    Shop pipeline (slip-cast | laser-cut | cnc-lathe |
#                                segmented-turning | drum-skin | hybrid)
#     status:      built | in-progress | partial-packet | scaffold | queued
#     sisters:     List of other slugs that share physics, lineage, or
#                  shop pipeline with this instrument
#     notes:       Optional one-line context

# ---------- Slip-cast ceramic vessel resonators ----------
ocarina:
  name: Ocarina (slip-cast Alto C 12-hole + family)
  family: vessel-flute
  pipeline: slip-cast
  status: built
  sisters: [udu, gemshorn, transverse-flute, kena, ceramic-tongue-drum]
  notes: Single-Helmholtz vessel; canonical ocarina form.

udu:
  name: Udu drum family (S/M/L/XL)
  family: drum-cavity
  pipeline: slip-cast
  status: built
  sisters: [ocarina, gemshorn, transverse-flute, ceramic-electric-violin, djembe]
  notes: Dual-Helmholtz vessel drum, Igbo lineage.

gemshorn:
  name: Gemshorn slip-cast horn-flute family
  family: vessel-flute
  pipeline: slip-cast
  status: built
  sisters: [ocarina, transverse-flute, kena, andean-duct-flutes]
  notes: Closest-in-shape comparison for ocarina; canonical slip-cast horn form.

transverse-flute:
  name: Slip-cast transverse flute family
  family: open-pipe
  pipeline: slip-cast
  status: built
  sisters: [ocarina, gemshorn, kena, irish-flute, shakuhachi, fujara]
  notes: Slip-cast bore, transverse embouchure.

kena:
  name: Kena (Andean notched-end vessel/duct flute)
  family: duct-flute
  pipeline: slip-cast
  status: scaffold
  sisters: [ocarina, gemshorn, transverse-flute, andean-duct-flutes, siku-zampona]
  notes: Slip-cast viable; Andean tradition.

ceramic-tongue-drum:
  name: Ceramic tongue drum
  family: cantilever-idiophone
  pipeline: slip-cast
  status: scaffold
  sisters: [tongue-drum, udu, ocarina, handpan]
  notes: Slip-cast variant of the wooden tongue-drum design study.

ceramic-electric-violin:
  name: Ceramic electric violin (slip-cast body + pickup)
  family: hybrid
  pipeline: slip-cast
  status: scaffold
  sisters: [acoustic-violin, electric-violin, udu, ocarina]
  notes: Hybrid acoustic/electric; slip-cast body, contact pickup.

andean-duct-flutes:
  name: Andean duct flute family (siku, zampona, moseno, pistalka)
  family: duct-flute
  pipeline: slip-cast
  status: queued
  sisters: [kena, gemshorn, transverse-flute, siku-zampona, moseno, pistalka]
  notes: Family of related duct flutes; slip-cast adaptation.

handpan:
  name: Handpan (steel-tongue idiophone)
  family: cantilever-idiophone
  pipeline: hybrid
  status: queued
  sisters: [tongue-drum, ceramic-tongue-drum]
  notes: Steel rather than ceramic; tonal-vessel adjacent.

