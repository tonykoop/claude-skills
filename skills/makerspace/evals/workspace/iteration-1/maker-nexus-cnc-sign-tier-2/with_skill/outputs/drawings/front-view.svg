<?xml version="1.0" encoding="UTF-8"?>
<!-- Front (edge) view showing thickness and V-carve cross-section. Scale 1:1 (illustrative). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="900" height="360" font-family="sans-serif">
  <style>
    .frame { fill: none; stroke: #222; stroke-width: 2; }
    .stock { fill: #f5e9c8; stroke: #2b2b2b; stroke-width: 2; }
    .cut   { fill: #c8b87a; stroke: #2b2b2b; stroke-width: 1; }
    .dim   { stroke: #6b3; stroke-width: 1; fill: none; }
    .dimtext { font-size: 14px; fill: #2a2a2a; }
    .title { font-size: 18px; font-weight: 700; fill: #111; }
    .meta  { font-size: 12px; fill: #444; }
  </style>

  <rect class="frame" x="20" y="20" width="860" height="280"/>
  <rect class="frame" x="20" y="300" width="860" height="40"/>
  <text class="title" x="35" y="328">CNC Welcome Sign — Front (edge) View</text>
  <text class="meta"  x="500" y="328">Scale 1:1  |  Units: in  |  Sheet 2 of 3  |  2026-05-07</text>

  <!-- Stock cross-section, magnified 8x for legibility. 18 x 0.25 in => 1440 x 20 px (we'll scale to fit) -->
  <!-- Use 36 px/in horizontally and 200 px/in vertically (exaggerated to show 0.25 thickness) -->
  <g transform="translate(120, 130)">
    <rect class="stock" x="0" y="0" width="648" height="50"/>

    <!-- V-carve grooves (illustrative, 7 letters represented as triangular cuts) -->
    <g class="cut">
      <polygon points="80,0 110,0 95,25"/>
      <polygon points="160,0 200,0 180,25"/>
      <polygon points="245,0 285,0 265,25"/>
      <polygon points="320,0 360,0 340,25"/>
      <polygon points="400,0 440,0 420,25"/>
      <polygon points="475,0 515,0 495,25"/>
      <polygon points="550,0 590,0 570,25"/>
    </g>

    <!-- Thickness dimension -->
    <line class="dim" x1="-30" y1="0"  x2="-30" y2="50"/>
    <line class="dim" x1="-35" y1="0"  x2="-25" y2="0"/>
    <line class="dim" x1="-35" y1="50" x2="-25" y2="50"/>
    <text class="dimtext" x="-115" y="28">t = 0.250</text>

    <!-- V-carve depth dimension -->
    <line class="dim" x1="670" y1="0"  x2="670" y2="25"/>
    <line class="dim" x1="665" y1="0"  x2="675" y2="0"/>
    <line class="dim" x1="665" y1="25" x2="675" y2="25"/>
    <text class="dimtext" x="685" y="18">d_v = 0.125 max</text>

    <!-- Length dimension -->
    <line class="dim" x1="0"   y1="-25" x2="648" y2="-25"/>
    <line class="dim" x1="0"   y1="-30" x2="0"   y2="-20"/>
    <line class="dim" x1="648" y1="-30" x2="648" y2="-20"/>
    <text class="dimtext" x="324" y="-30" text-anchor="middle">L = 18.000</text>
  </g>

  <text class="meta" x="35" y="245">Notes: V-grooves shown illustratively; depth varies by letter. 60° included angle.</text>
  <text class="meta" x="35" y="265">Vertical scale exaggerated for legibility (8:1 vertical vs 1:1 horizontal).</text>
  <text class="meta" x="35" y="40" fill="#a44">Stub drawing — regenerate from VCarve or CAD before publishing.</text>
</svg>
