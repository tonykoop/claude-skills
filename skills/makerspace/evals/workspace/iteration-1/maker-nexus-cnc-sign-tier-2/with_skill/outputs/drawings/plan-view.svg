<?xml version="1.0" encoding="UTF-8"?>
<!-- Plan view, CNC Welcome Sign. Scale 1:2 on a 9x6 in canvas. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600" font-family="sans-serif">
  <style>
    .frame { fill: none; stroke: #222; stroke-width: 2; }
    .part  { fill: #f5e9c8; stroke: #2b2b2b; stroke-width: 2; }
    .dim   { stroke: #6b3; stroke-width: 1; fill: none; }
    .dimtext { font-size: 14px; fill: #2a2a2a; }
    .title { font-size: 18px; font-weight: 700; fill: #111; }
    .meta  { font-size: 12px; fill: #444; }
    .center { stroke: #888; stroke-width: 1; stroke-dasharray: 6 3 1 3; fill: none; }
    .letters { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 110px; fill: #2b2b2b; letter-spacing: 6px; }
  </style>

  <!-- Drawing area frame -->
  <rect class="frame" x="20" y="20" width="860" height="520"/>

  <!-- Title block -->
  <rect class="frame" x="20" y="540" width="860" height="40"/>
  <text class="title" x="35" y="568">CNC Welcome Sign — Plan View</text>
  <text class="meta"  x="500" y="568">Scale 1:2  |  Units: in  |  Sheet 1 of 3  |  2026-05-07</text>

  <!-- Sign body, scaled 36 px/in. 18 x 6 in => 648 x 216 px. Origin (120, 220) puts it centered. -->
  <rect class="part" x="120" y="220" width="648" height="216" rx="9" ry="9"/>
  <line class="center" x1="120" y1="328" x2="768" y2="328"/>
  <line class="center" x1="444" y1="220" x2="444" y2="436"/>

  <!-- WELCOME letters (illustrative, not toolpath-accurate) -->
  <text class="letters" x="444" y="365" text-anchor="middle">WELCOME</text>

  <!-- Overall length dimension -->
  <line class="dim" x1="120" y1="195" x2="768" y2="195"/>
  <line class="dim" x1="120" y1="190" x2="120" y2="200"/>
  <line class="dim" x1="768" y1="190" x2="768" y2="200"/>
  <text class="dimtext" x="444" y="187" text-anchor="middle">L = 18.000 in</text>

  <!-- Width dimension -->
  <line class="dim" x1="795" y1="220" x2="795" y2="436"/>
  <line class="dim" x1="790" y1="220" x2="800" y2="220"/>
  <line class="dim" x1="790" y1="436" x2="800" y2="436"/>
  <text class="dimtext" x="810" y="332">W = 6.000 in</text>

  <!-- Corner radius callout -->
  <text class="dimtext" x="80"  y="218">R 0.250 (typ. 4)</text>

  <!-- Letter height callout -->
  <line class="dim" x1="100" y1="275" x2="100" y2="383"/>
  <line class="dim" x1="95"  y1="275" x2="105" y2="275"/>
  <line class="dim" x1="95"  y1="383" x2="105" y2="383"/>
  <text class="dimtext" x="40" y="332">h = 3.000</text>

  <!-- Border callouts -->
  <text class="dimtext" x="780" y="245">top border = 1.500</text>
  <text class="dimtext" x="780" y="425">bottom border = 1.500</text>

  <!-- Notes -->
  <text class="meta" x="35" y="490">Notes: 60° V-bit, V-carve max depth 0.125 in. 1/8 endmill profile, 6 tabs. Stock: 1/4" baltic birch.</text>
  <text class="meta" x="35" y="510">Tolerances: ±0.031 in unless noted; ±0.005 in on V-carve depth.</text>

  <!-- Stub-warning -->
  <text class="meta" x="35" y="40" fill="#a44">Stub drawing — regenerate from VCarve or CAD before publishing.</text>
</svg>
