name: sheet-metal
version: 1.0.0
last-updated: 2026-05-18
description: |
  Sheet metal CAD, DFM, and shop-floor planning skill for SolidWorks Sheet
  Metal, parametric design tables, Master Layout Parts, flat patterns, bend
  allowance, plasma/DXF review, boxes, toolboxes, stackable cases and dollies,
  enclosures, horns and lofted bends, combat robots, automotive brackets and
  racks, lighting, kinetic sculpture, camp/outdoor gear, food tools, creator
  rigs, props, furniture accents, repair panels, STEM kits, percussion,
  decor, and mixed wood-metal art. Includes five specialist sub-agents
  (DFM reviewer, safety gate, parametric equations, manufacturing planner,
  red team), four deterministic scripts, and a real-world example packet.
authors:
  - name: Tony Koop
    url: https://github.com/tonykoop
license: MIT
homepage: https://github.com/tonykoop/claude-skills
keywords:
  - sheet-metal
  - solidworks
  - dxf
  - plasma
  - brake
  - slip-roll
  - toolbox
  - enclosure
  - combat-robotics
  - horn
  - roof-rack
  - lighting
  - kinetic-sculpture
  - camping
  - props
  - furniture
  - repair
  - stem
  - percussion
  - makerspace
compatibility:
  cowork: ">=0.1"
  claude-code: ">=0.1"
  codex: ">=0.1"
  features:
    - bash
    - python3
    - file-write
